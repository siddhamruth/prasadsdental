server {
    listen 80;
    server_name prasadsdental.com www.prasadsdental.com;

    # Redirect www to non-www
    if ($host = www.prasadsdental.com) {
        return 301 https://prasadsdental.com$request_uri;
    }

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name prasadsdental.com;

    # SSL will be configured by certbot
    ssl_certificate /etc/letsencrypt/live/prasadsdental.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prasadsdental.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3003;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Redirect www HTTPS to non-www
server {
    listen 443 ssl;
    server_name www.prasadsdental.com;

    ssl_certificate /etc/letsencrypt/live/prasadsdental.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prasadsdental.com/privkey.pem;

    return 301 https://prasadsdental.com$request_uri;
}
